name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de execução dos testes'
        required: false
        default: 'test'
        type: choice
        options:
          - test
          - development
          - staging
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: desafio_itau_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout no código
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Exibir informações de execução
        run: |
          echo "======================================"
          echo "  CI/CD Pipeline - Informações da Execução"
          echo "======================================"
          echo "Branch: ${{ github.event.inputs.branch || github.ref_name }}"
          echo "Environment: ${{ github.event.inputs.environment || 'N/A' }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "======================================"

      - name: Configurar Java 17 e cache do Maven
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Buildar com o Maven
        run: mvn clean install -DskipTests

      - name: Executar testes e gerar relatório de cobertura
        run: mvn test
        env:
          DESAFIO_ITAU_DB_NAME: desafio_itau_db
          DESAFIO_ITAU_DB_USER: postgres
          DESAFIO_ITAU_DB_PASSWORD: postgres

      - name: Gerar relatório de cobertura JaCoCo
        if: always()
        run: mvn jacoco:report

      - name: Verificar cobertura mínima
        run: mvn jacoco:check
        continue-on-error: true

      - name: Enviar cobertura para Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Exibir resumo dos testes
        if: always()
        run: |
          echo "=== Resumo dos Testes ==="
          if [ -d "target/surefire-reports" ]; then
            echo "Relatórios de teste encontrados:"
            ls -la target/surefire-reports/
            echo ""
            echo "=== Contagem de Testes ==="
            grep -r "Tests run:" target/surefire-reports/*.txt | tail -1 || echo "Nenhum resumo encontrado"
          else
            echo "Diretório target/surefire-reports não encontrado"
          fi

      - name: Publicar resultados dos testes unitários
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            target/surefire-reports/TEST-*.xml
          check_name: Unit Test Results
          comment_mode: off
        continue-on-error: true

      - name: Exibir resumo da cobertura de código
        if: always()
        run: |
          echo "======================================"
          echo "  Resumo da Cobertura de Código"
          echo "======================================"
          if [ -f "target/site/jacoco/index.html" ]; then
            echo "✅ Relatório JaCoCo gerado com sucesso"
            echo "📊 Relatório disponível em: target/site/jacoco/index.html"
            echo ""
            if [ -f "target/site/jacoco/jacoco.csv" ]; then
              echo "=== Cobertura por Pacote ==="
              head -20 target/site/jacoco/jacoco.csv | column -t -s','
            fi
          else
            echo "❌ Relatório JaCoCo não foi gerado"
          fi
          echo "======================================"
          echo "Cobertura mínima esperada: 90% para pacotes principais"
          echo "======================================"

      - name: Upload do relatório JaCoCo
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

      - name: Upload dos relatórios de teste
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 30

